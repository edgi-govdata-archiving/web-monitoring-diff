name: Build Docker Image

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build metadata
        id: vars
        run: |
          echo "VERSION=$(python -c 'import versioneer; print(versioneer.get_version())')" >> $GITHUB_OUTPUT
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.vars.outputs.VERSION }} \
            -t web-monitoring-diff .
