[flake8]
exclude =
    .git,
    __pycache__,
    build,
    dist,
    venv,
    .venv*,
    versioneer.py,
    web_monitoring_diff/_version.py,
    docs/source/conf.py
# TODO: expand checks beyond just Pyflakes (F). We have a lot of legacy code
# to update that flake8 doesn't like, though.
select = F,W
extend-ignore = W503,W504
max-line-length = 115
